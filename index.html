<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>&#21475;&#31639;&#23567;&#21191;&#22763;</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#f4f6ff;color:#23324d;font-family:Arial,"Microsoft YaHei",sans-serif}#app{max-width:820px;min-height:100vh;margin:auto;padding:24px;background:linear-gradient(145deg,#f6f2ff,#edf9ff)}button{font:inherit;font-weight:700;cursor:pointer;border:0;touch-action:manipulation}.top{display:flex;justify-content:space-between;align-items:center}.brand{font-size:28px;font-weight:900;color:#4c5ec8}.sound{padding:10px 14px;border-radius:20px;background:#fff;color:#34415e}.page{max-width:680px;margin:25px auto}.hide{display:none!important}.welcome{text-align:center;padding:15px}.fox{font-size:72px}.welcome h1{font-size:38px;margin:10px 0;color:#4b5fc8}.welcome p{font-size:18px;color:#5e6e87}.choices,.levels{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:28px}.choice,.level{min-height:142px;background:#fff;border-radius:24px;padding:22px;text-align:left;color:#293853;box-shadow:0 8px 20px #3145681c}.choice b{display:block;font-size:23px;margin:8px 0}.choice span,.level small{font-weight:500;color:#64738b}.level{min-height:92px;border-radius:18px}.level b{display:block;font-size:18px}.back{margin:18px 0;padding:10px;background:transparent;color:#4d5fc5}.gamebar{display:flex;align-items:center;gap:12px;margin-bottom:15px}.gamebar b{white-space:nowrap}.progress{height:12px;flex:1;border-radius:99px;background:#dce4fb;overflow:hidden}.progress i{display:block;height:100%;background:#596bd8;width:0;transition:.25s}.quit{background:transparent;color:#596bd8;padding:6px}.card{background:#fff;border-radius:30px;padding:35px 20px;text-align:center;box-shadow:0 8px 25px #31456818}.label{color:#65758e;font-weight:700}.sum{font-size:76px;font-weight:900;margin:8px 0}.answer{display:inline-flex;align-items:center;justify-content:center;min-width:150px;height:62px;border-radius:18px;border:3px dashed #b5c1e5;background:#f6f8ff;font-size:36px;font-weight:900;color:#4d5fc5}.answer.empty:after{content:"?";color:#aeb8d5}.feedback{min-height:30px;margin-top:14px;font-size:18px;font-weight:800}.right{color:#168867}.wrong{color:#c55060}.hint{margin:16px auto 0;max-width:580px;padding:16px;border-radius:18px;background:#fff6d9;text-align:left;font-weight:700}.dots{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px}.dot{width:18px;height:18px;border-radius:50%;background:#7185df}.dot.b{background:#f4aa4f}.dot.x{background:#d1d9eb;position:relative}.dot.x:after{content:"";position:absolute;left:-3px;top:8px;width:24px;height:3px;background:#ea7079;transform:rotate(-45deg)}.next{display:block;margin:14px auto 0;padding:11px 18px;border-radius:13px;background:#596bd8;color:#fff}.keys{max-width:430px;margin:20px auto;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.key{padding:15px;border-radius:16px;background:#fff;color:#2d3b56;font-size:25px;box-shadow:0 4px 10px #31456818}.key.action{font-size:17px;background:#e9edfc;color:#4e60bf}.key.ok{background:#2faf87;color:#fff}.finish{text-align:center}.finish .medal{font-size:88px}.finish h2{font-size:34px;margin:8px}.finish p{font-size:20px;color:#5d6c83}.finish button{padding:14px 20px;border-radius:15px;margin:6px}.again{background:#596bd8;color:#fff}.home{background:#fff;color:#596bd8}.record{background:#fff;border-radius:20px;padding:16px;margin-top:20px;text-align:left}.record h3{margin:0 0 12px}.numbers{display:grid;grid-template-columns:repeat(3,1fr);text-align:center}.numbers b{display:block;font-size:24px;color:#4d5fc5}.numbers span{font-size:13px;color:#63718a}@media(max-width:500px){#app{padding:16px}.choices,.levels{grid-template-columns:1fr}.welcome h1{font-size:30px}.sum{font-size:60px}.card{padding:25px 12px}}
</style>
</head>
<body>
<div id="app">
 <div class="top"><div class="brand">&#127775; &#21475;&#31639;&#23567;&#21191;&#22763;</div><button id="sound" class="sound">&#128266; &#38899;&#25928;&#24320;</button></div>
 <section id="home" class="page"><div class="welcome"><div class="fox">&#129418;</div><h1>&#20170;&#22825;&#20063;&#26469;&#38383;&#20851;&#21543;&#65281;</h1><p>&#27599;&#19968;&#39064;&#37117;&#35748;&#30495;&#24819;&#19968;&#24819;&#65292;&#20320;&#19968;&#23450;&#34892;&#12290;</p></div><div class="choices"><button id="auto" class="choice">&#128640;<b>&#25105;&#26469;&#25361;&#25112;</b><span>&#20174; 10 &#20197;&#20869;&#24320;&#22987;&#65292;&#31572;&#24471;&#22909;&#23601;&#21319;&#32423;</span></button><button id="pick" class="choice">&#129513;<b>&#33258;&#24049;&#36873;&#38590;&#24230;</b><span>&#32451;&#20064;&#20320;&#24819;&#32451;&#30340;&#21152;&#27861;&#25110;&#20943;&#27861;</span></button></div><div id="levels" class="levels hide"><button class="level" data-mode="a10"><b>10 &#20197;&#20869;&#21152;&#27861;</b><small>&#25226;&#20004;&#20010;&#25968;&#21512;&#36215;&#26469;</small></button><button class="level" data-mode="s10"><b>10 &#20197;&#20869;&#20943;&#27861;</b><small>&#20174;&#24635;&#25968;&#20013;&#20943;&#21435;&#19968;&#37096;&#20998;</small></button><button class="level" data-mode="a20"><b>20 &#20197;&#20869;&#21152;&#27861;</b><small>&#32467;&#26524;&#19981;&#36229;&#36807; 20</small></button><button class="level" data-mode="s20"><b>20 &#20197;&#20869;&#20943;&#27861;</b><small>&#31572;&#26696;&#19981;&#23567;&#20110; 0</small></button><button class="level" data-mode="m20"><b>20 &#20197;&#20869;&#28151;&#21512;</b><small>&#21152;&#27861;&#12289;&#20943;&#27861;&#20132;&#26367;&#20986;&#29616;</small></button></div><button id="return" class="back hide">&#8592; &#36820;&#22238;</button></section>
 <section id="game" class="page hide"><div class="gamebar"><b id="count"></b><div class="progress"><i id="bar"></i></div><button id="quit" class="quit">&#32467;&#26463;&#32451;&#20064;</button></div><div class="card"><div id="kind" class="label"></div><div id="sum" class="sum"></div><div id="answer" class="answer empty"></div><div id="feedback" class="feedback"></div><div id="hint" class="hint hide"><div>&#128065; &#30475;&#19968;&#30475;</div><div id="hinttext"></div><div id="dots" class="dots"></div><button id="next" class="next">&#19979;&#19968;&#39064; &#8594;</button></div></div><div class="keys"><button class="key" data-k="1">1</button><button class="key" data-k="2">2</button><button class="key" data-k="3">3</button><button class="key" data-k="4">4</button><button class="key" data-k="5">5</button><button class="key" data-k="6">6</button><button class="key" data-k="7">7</button><button class="key" data-k="8">8</button><button class="key" data-k="9">9</button><button class="key action" data-k="clear">&#28165;&#38500;</button><button class="key" data-k="0">0</button><button class="key ok" data-k="go">&#30830;&#35748;</button></div></section>
 <section id="done" class="page finish hide"><div class="medal">&#127941;</div><h2 id="title"></h2><p id="score"></p><button id="again" class="again">&#20877;&#26469;&#19968;&#32452;</button><button id="tohome" class="home">&#22238;&#21040;&#39318;&#39029;</button><div class="record"><h3>&#23478;&#38271;&#23567;&#35760;&#24405;</h3><div class="numbers"><div><b id="total">0</b><span>&#32047;&#35745;&#39064;&#25968;</span></div><div><b id="rate">-</b><span>&#32047;&#35745;&#27491;&#30830;&#29575;</span></div><div><b id="weak">-</b><span>&#38656;&#35201;&#22810;&#32451;</span></div></div><button id="erase" class="back">&#28165;&#31354;&#26412;&#26426;&#35760;&#24405;</button></div></section>
</div>
<script>
(()=>{const g=id=>document.getElementById(id),C={add:'\u52a0\u6cd5',sub:'\u51cf\u6cd5',auto:'\u81ea\u52a8\u95ef\u5173'};let mode='auto',i=0,right=0,limit=10,q=null,locked=false,sound=true,st={total:0,right:0,wrong:{}};try{const x=localStorage.getItem('kidMath');if(x)st=JSON.parse(x)}catch(e){}const pages=['home','game','done'];function page(x){pages.forEach(p=>g(p).classList.toggle('hide',p!==x))}function save(){try{localStorage.setItem('kidMath',JSON.stringify(st))}catch(e){}}function beep(ok){if(!sound)return;try{const c=new AudioContext(),o=c.createOscillator(),v=c.createGain();o.frequency.value=ok?650:250;v.gain.setValueAtTime(.07,c.currentTime);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+.16);o.connect(v).connect(c.destination);o.start();o.stop(c.currentTime+.18)}catch(e){}}function make(){let max=mode==='auto'?limit:(mode.includes('20')?20:10),op=mode[0]==='a'?'+':mode[0]==='s'?'-':Math.random()<.5?'+':'-',a,b;if(op==='+'){a=Math.floor(Math.random()*(max+1));b=Math.floor(Math.random()*(max-a+1));if(a+b===0)b=1}else{a=Math.max(1,Math.floor(Math.random()*(max+1)));b=Math.floor(Math.random()*(a+1))}q={a,b,op,ans:op==='+'?a+b:a-b,type:op==='+'?'add':'sub'};locked=false;g('sum').textContent=a+' '+op+' '+b+' = ?';g('kind').textContent=mode==='auto'?C.auto:(max===20?'20 ':'10 ')+C[q.type];g('answer').textContent='';g('answer').classList.add('empty');g('feedback').textContent='';g('hint').classList.add('hide');g('count').textContent=''+(i+1)+' / 10';g('bar').style.width=(i*10)+'%'}function start(m){mode=m;i=0;right=0;limit=10;page('game');make()}function key(k){if(locked)return;const a=g('answer');if(k==='clear'){a.textContent='';a.classList.add('empty');return}if(k==='go'){if(a.textContent)check();return}if(a.textContent.length<2){a.textContent+=k;a.classList.remove('empty')}}function check(){locked=true;if(Number(g('answer').textContent)===q.ans){right++;st.right++;st.total++;save();g('feedback').textContent='\u7b54\u5bf9\u5566\uff0c\u771f\u68d2\uff01 \u2728';g('feedback').className='feedback right';beep(true);setTimeout(next,650)}else{st.total++;st.wrong[q.type]=(st.wrong[q.type]||0)+1;save();g('feedback').textContent='\u6ca1\u5173\u7cfb\uff0c\u6211\u4eec\u4e00\u8d77\u770b\u4e00\u770b\u3002';g('feedback').className='feedback wrong';beep(false);g('hinttext').textContent=q.op==='+'?q.a+' + '+q.b+' = ?':q.a+' - '+q.b+' = ?';g('dots').innerHTML=Array.from({length:q.op==='+'?q.a+q.b:q.a},(_,n)=>'<i class="dot '+(q.op==='+'&&n>=q.a?'b':q.op==='-'&&n>=q.a-q.b?'x':'')+'"></i>').join('');g('hint').classList.remove('hide')}}function next(){i++;if(i===10){finish();return}if(mode==='auto'&&i===5&&right>=4)limit=20;make()}function finish(){page('done');const r=Math.round(right*10);g('title').textContent=r===100?'\u5168\u5bf9\uff01\u592a\u5389\u5bb3\u4e86\uff01':r>=70?'\u5b8c\u6210\u95ef\u5173\uff0c\u771f\u4e0d\u9519\uff01':'\u5b8c\u6210\u5566\uff0c\u7ee7\u7eed\u52a0\u6cb9\uff01';g('score').textContent='\u8fd9\u7ec4\u7b54\u5bf9 '+right+' \u9898\uff0c\u5171 10 \u9898';const w=Object.entries(st.wrong).sort((a,b)=>b[1]-a[1])[0];g('total').textContent=st.total;g('rate').textContent=st.total?Math.round(st.right/st.total*100)+'%':'-';g('weak').textContent=w?C[w[0]]:'-'}g('auto').onclick=()=>start('auto');g('pick').onclick=()=>{g('levels').classList.remove('hide');g('return').classList.remove('hide');document.querySelector('.choices').classList.add('hide')};g('return').onclick=()=>{g('levels').classList.add('hide');g('return').classList.add('hide');document.querySelector('.choices').classList.remove('hide')};document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>start(b.dataset.mode));document.querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>key(b.dataset.k));g('next').onclick=next;g('quit').onclick=()=>page('home');g('again').onclick=()=>start(mode);g('tohome').onclick=()=>page('home');g('sound').onclick=()=>{sound=!sound;g('sound').textContent=sound?'\ud83d\udd0a \u97f3\u6548\u5f00':'\ud83d\udd07 \u97f3\u6548\u5173'};g('erase').onclick=()=>{st={total:0,right:0,wrong:{}};save();finish()};document.addEventListener('keydown',e=>{if(!g('game').classList.contains('hide')){if(/^\d$/.test(e.key))key(e.key);if(e.key==='Backspace')key('clear');if(e.key==='Enter')key('go')}})})();
</script>
</body>
</html>
