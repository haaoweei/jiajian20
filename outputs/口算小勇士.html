<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>口算小勇士</title><style>html,body{margin:0;min-height:100%;background:#f5f2ff}</style></head><body><div id="math-adventure">
  <style>
    #math-adventure{--ink:#243148;--soft:#f6f8ff;--blue:#5267d8;--purple:#825dd5;--yellow:#ffd766;--green:#31af87;--red:#ed6c78;color:var(--ink);font-family:"Microsoft YaHei",system-ui,sans-serif;background:linear-gradient(160deg,#f5f2ff,#f0fbff);border-radius:28px;padding:clamp(16px,4vw,34px);box-sizing:border-box;min-height:620px}#math-adventure *{box-sizing:border-box}#math-adventure button{font:inherit;font-weight:700;cursor:pointer;border:0;touch-action:manipulation}#math-adventure .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:26px}.brand{font-size:clamp(21px,4vw,30px);font-weight:900;letter-spacing:.04em}.sound{background:#fff;color:var(--ink);border-radius:999px;padding:10px 16px;box-shadow:0 3px 12px #32476618}.screen{max-width:760px;margin:auto}.hero{text-align:center;padding:12px 0 24px}.mascot{font-size:80px;line-height:1}.hero h1{font-size:clamp(30px,6vw,46px);margin:8px 0;color:#485dc6}.hero p{font-size:18px;margin:0;color:#596981}.choice-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.choice{padding:23px 18px;border-radius:24px;text-align:left;background:#fff;box-shadow:0 8px 22px #32476616;color:var(--ink);min-height:130px;transition:transform .16s}.choice:active,.key:active{transform:scale(.97)}.choice strong{display:block;font-size:23px;margin:8px 0}.choice span{color:#66758b;font-weight:500}.choice .icon{font-size:30px}.levels{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:16px}.level{background:#fff;padding:18px;border-radius:18px;text-align:left;color:var(--ink);box-shadow:0 5px 16px #32476613}.level strong{display:block;font-size:17px}.level small{color:#6c7890;font-weight:500}.back{margin-top:18px;background:transparent;color:#5463bf;padding:10px}.game-head{display:flex;justify-content:space-between;align-items:center;margin:0 auto 16px;max-width:600px}.progress{height:12px;background:#dce2fa;border-radius:99px;overflow:hidden;flex:1;margin:0 12px}.progress i{display:block;background:linear-gradient(90deg,var(--blue),var(--purple));height:100%;border-radius:inherit;transition:width .3s}.question-card{background:#fff;border-radius:30px;padding:clamp(20px,6vw,42px);text-align:center;box-shadow:0 10px 28px #32476618}.question-label{font-size:16px;color:#69778d;font-weight:700}.question{font-size:clamp(56px,14vw,95px);font-weight:900;letter-spacing:.03em;margin:8px 0 16px}.answer{height:62px;min-width:160px;display:inline-flex;align-items:center;justify-content:center;padding:0 22px;border-radius:18px;background:var(--soft);border:3px dashed #b8c3e8;font-size:36px;font-weight:900;color:#485dc6}.answer.blank:after{content:"?";color:#aeb9d5}.keypad{max-width:440px;margin:20px auto 0;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.key{background:#fff;border-radius:16px;padding:15px;font-size:26px;color:#31405d;box-shadow:0 4px 12px #32476615}.key.special{background:#e9ecfb;color:#4a5abb}.key.confirm{background:var(--green);color:#fff;font-size:19px}.feedback{min-height:34px;margin:16px 0 0;font-size:18px;font-weight:800}.ok{color:#188766}.no{color:#c75161}.hint{margin:18px auto 0;max-width:600px;background:#fff8dd;border-radius:20px;padding:15px 18px;text-align:left}.hint-title{font-weight:900;margin-bottom:9px}.dots{display:flex;flex-wrap:wrap;gap:7px;min-height:25px}.dot{width:19px;height:19px;border-radius:50%;background:#7488e5}.dot.take{background:#d3d9ee;position:relative}.dot.take:after{content:"";position:absolute;top:8px;left:-3px;width:25px;height:3px;transform:rotate(-45deg);background:#ef7680}.dot.second{background:#f6a84b}.numberline{margin-top:13px;display:flex;justify-content:space-between;font-size:12px;color:#61708a;border-top:3px solid #8fa0cf;padding-top:3px}.next{display:block;margin:15px auto 0;background:var(--blue);color:#fff;border-radius:14px;padding:12px 20px}.result{text-align:center}.result .badge{font-size:90px}.result h2{font-size:34px;margin:5px 0}.score{font-size:21px;color:#5c6a81}.result-actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:22px}.primary{background:var(--blue);color:#fff;border-radius:16px;padding:15px 20px}.secondary{background:#fff;color:var(--blue);border-radius:16px;padding:15px 20px}.stats{margin-top:24px;background:#fff;border-radius:22px;padding:18px;text-align:left}.stats h3{margin:0 0 10px}.statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}.statrow b{display:block;font-size:24px;color:#485dc6}.statrow span{font-size:13px;color:#6c7890}.hidden{display:none!important}@media(max-width:480px){#math-adventure{padding:16px;border-radius:0;min-height:600px}.choice-grid,.levels{grid-template-columns:1fr}.choice{min-height:auto;padding:17px}.question-card{padding:20px 12px}.key{padding:13px}.brand{font-size:21px}}
  </style>
  <div class="top"><div class="brand">馃専 鍙ｇ畻灏忓媷澹?/div><button class="sound" id="soundBtn" aria-pressed="true">馃攰 闊虫晥寮€</button></div>
  <main class="screen" id="homeScreen">
    <section class="hero"><div class="mascot" aria-hidden="true">馃</div><h1>浠婂ぉ涔熸潵闂叧鍚э紒</h1><p>姣忎竴棰橀兘璁ょ湡鎯充竴鎯筹紝浣犱竴瀹氳銆?/p></section>
    <div class="choice-grid"><button class="choice" id="autoBtn"><div class="icon">馃殌</div><strong>鎴戞潵鎸戞垬</strong><span>浠?10 浠ュ唴寮€濮嬶紝绛斿緱濂藉氨鍗囩骇</span></button><button class="choice" id="chooseBtn"><div class="icon">馃З</div><strong>鑷繁閫夐毦搴?/strong><span>缁冧範浣犳兂缁冪殑鍔犳硶鎴栧噺娉?/span></button></div>
    <section class="levels hidden" id="levels"><button class="level" data-mode="add10"><strong>10 浠ュ唴鍔犳硶</strong><small>鎶婁袱涓暟鍚堣捣鏉?/small></button><button class="level" data-mode="sub10"><strong>10 浠ュ唴鍑忔硶</strong><small>浠庢€绘暟涓噺鍘讳竴閮ㄥ垎</small></button><button class="level" data-mode="add20"><strong>20 浠ュ唴鍔犳硶</strong><small>缁撴灉涓嶈秴杩?20</small></button><button class="level" data-mode="sub20"><strong>20 浠ュ唴鍑忔硶</strong><small>绛旀涓嶅皬浜?0</small></button><button class="level" data-mode="mix20"><strong>20 浠ュ唴娣峰悎</strong><small>鍔犳硶銆佸噺娉曚氦鏇垮嚭鐜?/small></button><button class="level" data-mode="mix10"><strong>10 浠ュ唴娣峰悎</strong><small>杞绘澗澶嶄範</small></button></section>
    <button class="back hidden" id="hideLevels">鈫?杩斿洖</button>
  </main>
  <main class="screen hidden" id="gameScreen"><div class="game-head"><b id="roundText">绗?1 / 10 棰?/b><div class="progress"><i id="progressBar"></i></div><button class="back" id="quitBtn">缁撴潫缁冧範</button></div><section class="question-card"><div class="question-label" id="modeLabel"></div><div class="question" id="question" aria-live="polite"></div><div class="answer blank" id="answer" aria-label="褰撳墠绛旀"></div><div class="feedback" id="feedback" aria-live="polite"></div><div class="hint hidden" id="hint"><div class="hint-title">馃憖 鐪嬩竴鐪?/div><div id="hintText"></div><div class="dots" id="dots"></div><div class="numberline" id="line"></div><button class="next" id="nextBtn">涓嬩竴棰?鈫?/button></div></section><div class="keypad" aria-label="鏁板瓧閿洏"><button class="key" data-key="1">1</button><button class="key" data-key="2">2</button><button class="key" data-key="3">3</button><button class="key" data-key="4">4</button><button class="key" data-key="5">5</button><button class="key" data-key="6">6</button><button class="key" data-key="7">7</button><button class="key" data-key="8">8</button><button class="key" data-key="9">9</button><button class="key special" data-key="clear">娓呴櫎</button><button class="key" data-key="0">0</button><button class="key confirm" data-key="confirm">纭</button></div></main>
  <main class="screen hidden result" id="resultScreen"><div class="badge">馃弲</div><h2 id="resultTitle">瀹屾垚鍟︼紒</h2><p class="score" id="resultScore"></p><div class="result-actions"><button class="primary" id="againBtn">鍐嶆潵涓€缁?/button><button class="secondary" id="homeBtn">鍥炲埌棣栭〉</button></div><section class="stats"><h3>瀹堕暱灏忚褰?/h3><div class="statrow"><div><b id="totalCount">0</b><span>绱棰樻暟</span></div><div><b id="totalRate">鈥?/b><span>绱姝ｇ‘鐜?/span></div><div><b id="weakType">鏆傛棤</b><span>闇€瑕佸缁?/span></div></div><button class="back" id="clearStats">娓呯┖鏈満璁板綍</button></section></main>
  <script>
  (()=>{const $=id=>document.getElementById(id),screens=['homeScreen','gameScreen','resultScreen'];let mode='auto',question={},index=0,correct=0,answered=false,sound=true,autoMax=10;let stats={total:0,right:0,wrong:{}};try{let saved=localStorage.getItem('mathHeroStats');if(saved)stats=JSON.parse(saved)}catch(e){}const labels={add10:'10 浠ュ唴鍔犳硶',sub10:'10 浠ュ唴鍑忔硶',add20:'20 浠ュ唴鍔犳硶',sub20:'20 浠ュ唴鍑忔硶',mix10:'10 浠ュ唴娣峰悎',mix20:'20 浠ュ唴娣峰悎',auto:'鑷姩闂叧'};function show(id){screens.forEach(x=>$(x).classList.toggle('hidden',x!==id))}function tone(ok){if(!sound)return;try{let c=new AudioContext(),o=c.createOscillator(),g=c.createGain();o.frequency.value=ok?660:260;g.gain.setValueAtTime(.06,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.18);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.2)}catch(e){}}function setting(){let max=mode==='auto'?autoMax:(mode.includes('20')?20:10),op=mode.includes('add')?'+':mode.includes('sub')?'-':Math.random()<.5?'+':'-';return{max,op}}function random(){let s=setting(),a,b;if(s.op==='+'){a=Math.floor(Math.random()*(s.max+1));b=Math.floor(Math.random()*(s.max-a+1));if(a+b===0)b=1}else{a=Math.floor(Math.random()*(s.max+1));b=Math.floor(Math.random()*(a+1));if(a===0)a=1}question={a,b,op:s.op,answer:s.op==='+'?a+b:a-b,max:s.max,type:s.op==='+'?'鍔犳硶':'鍑忔硶'};answered=false;$('question').textContent=`${a} ${s.op} ${b} = ?`;$('modeLabel').textContent=labels[mode];$('answer').textContent='';$('answer').classList.add('blank');$('feedback').textContent='';$('hint').classList.add('hidden');$('roundText').textContent=`绗?${index+1} / 10 棰榒;$('progressBar').style.width=`${index*10}%`}function start(m){mode=m;index=0;correct=0;autoMax=10;show('gameScreen');random()}function answerKey(k){if(answered)return;let el=$('answer'),v=el.textContent;if(k==='clear'){el.textContent='';el.classList.add('blank');return}if(k==='confirm'){if(v==='')return;check();return}if(v.length>=2)return;el.textContent=v+k;el.classList.remove('blank')}function check(){let got=Number($('answer').textContent);if(got===question.answer){answered=true;correct++;stats.total++;stats.right++;save();$('feedback').textContent='绛斿鍟︼紝鐪熸锛?鉁?;$('feedback').className='feedback ok';tone(true);setTimeout(next,700)}else{answered=true;stats.total++;stats.wrong[question.type]=(stats.wrong[question.type]||0)+1;save();$('feedback').textContent='娌″叧绯伙紝鎴戜滑涓€璧风湅涓€鐪嬨€?;$('feedback').className='feedback no';tone(false);hint()}}function hint(){let q=question;$('hintText').textContent=q.op==='+'?`${q.a} 涓拰 ${q.b} 涓悎璧锋潵锛屼竴鍏辨槸澶氬皯鍛紵`:`涓€鍏辨湁 ${q.a} 涓紝鍒掓帀 ${q.b} 涓紝杩樺墿澶氬皯鍛紵`;$('dots').innerHTML=Array.from({length:q.a+(q.op==='+'?q.b:0)},(_,i)=>`<i class="dot ${q.op==='-'&&i>=q.a-q.b?'take':q.op==='+'&&i>=q.a?'second':''}"></i>`).join('');$('line').innerHTML=Array.from({length:q.max+1},(_,i)=>`<span>${i}</span>`).join('');$('hint').classList.remove('hidden')}function next(){index++;if(index>=10){finish();return}if(mode==='auto'&&correct>=8&&index===5)autoMax=20;random()}function save(){try{localStorage.setItem('mathHeroStats',JSON.stringify(stats))}catch(e){}}function displayStats(){let wrong=Object.entries(stats.wrong);let weak=wrong.length?wrong.sort((a,b)=>b[1]-a[1])[0][0]:'鏆傛棤';$('totalCount').textContent=stats.total;$('totalRate').textContent=stats.total?Math.round(stats.right/stats.total*100)+'%':'鈥?;$('weakType').textContent=weak}function finish(){show('resultScreen');let rate=Math.round(correct/10*100);$('resultTitle').textContent=rate===100?'鍏ㄥ锛佸お鍘夊浜嗭紒':rate>=70?'瀹屾垚闂叧锛岀湡涓嶉敊锛?:'瀹屾垚鍟︼紝缁х画鍔犳补锛?;$('resultScore').textContent=`杩欑粍绛斿 ${correct} 棰橈紝鍏?10 棰榒;displayStats()}$('autoBtn').onclick=()=>start('auto');$('chooseBtn').onclick=()=>{$('levels').classList.remove('hidden');$('hideLevels').classList.remove('hidden');$('chooseBtn').classList.add('hidden');$('autoBtn').classList.add('hidden')};$('hideLevels').onclick=()=>{$('levels').classList.add('hidden');$('hideLevels').classList.add('hidden');$('chooseBtn').classList.remove('hidden');$('autoBtn').classList.remove('hidden')};document.querySelectorAll('.level').forEach(b=>b.onclick=()=>start(b.dataset.mode));document.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>answerKey(b.dataset.key));$('nextBtn').onclick=next;$('quitBtn').onclick=()=>{show('homeScreen');$('levels').classList.add('hidden');$('hideLevels').classList.add('hidden');$('chooseBtn').classList.remove('hidden');$('autoBtn').classList.remove('hidden')};$('againBtn').onclick=()=>start(mode);$('homeBtn').onclick=()=>$('quitBtn').click();$('soundBtn').onclick=()=>{sound=!sound;$('soundBtn').textContent=sound?'馃攰 闊虫晥寮€':'馃攪 闊虫晥鍏?;$('soundBtn').setAttribute('aria-pressed',sound)};$('clearStats').onclick=()=>{if(confirm('纭畾娓呯┖杩欏彴璁惧涓婄殑缁冧範璁板綍鍚楋紵')){stats={total:0,right:0,wrong:{}};save();displayStats()}};document.addEventListener('keydown',e=>{if(!$('gameScreen').classList.contains('hidden')){if(/^\d$/.test(e.key))answerKey(e.key);if(e.key==='Backspace')answerKey('clear');if(e.key==='Enter')answerKey('confirm')}})})();
  </script>
</div>
</body></html>
